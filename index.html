/* ============================================================
   Kanban Perícias · Microbiologia — estilos
   Tema claro/escuro por variáveis CSS. Sem dependências.
   ============================================================ */
*,*::before,*::after{box-sizing:border-box}
html,body{height:100%}
:root{
  --bg:#eef2f6; --surface:#ffffff; --surface-2:#f7f9fb; --surface-3:#eef2f6;
  --text:#0f172a; --muted:#5b6b7f; --faint:#8595a7;
  --border:#dde5ee; --border-strong:#c7d2e0;
  --brand:#0d9488; --brand-ink:#0b7d72; --brand-soft:#d7f2ee;
  --danger:#e11d48; --warn:#d97706; --ok:#16a34a; --info:#2563eb;
  --shadow:0 1px 2px rgba(16,32,64,.06),0 4px 14px rgba(16,32,64,.06);
  --shadow-lg:0 12px 40px rgba(16,32,64,.18);
  --radius:14px; --radius-sm:10px;
  --col-w:308px;
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}
[data-theme="dark"]{
  --bg:#0b1220; --surface:#131c2b; --surface-2:#0f1826; --surface-3:#1b2637;
  --text:#e8eef6; --muted:#9fb0c4; --faint:#6f8199;
  --border:#25324a; --border-strong:#31425f;
  --brand:#2dd4bf; --brand-ink:#5eead4; --brand-soft:#123a37;
  --danger:#fb7185; --warn:#fbbf24; --ok:#4ade80; --info:#60a5fa;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 6px 20px rgba(0,0,0,.35);
  --shadow-lg:0 18px 50px rgba(0,0,0,.55);
}
body{
  margin:0;font-family:var(--font);background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased;text-rendering:optimizelegibility;
}
button,input,select,textarea{font:inherit;color:inherit}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* ---------- Topbar ---------- */
.topbar{
  display:flex;align-items:center;gap:16px;justify-content:space-between;
  padding:12px 18px;background:var(--surface);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:20;
}
.brand{display:flex;align-items:center;gap:12px;min-width:0}
.brand-mark{font-size:26px;filter:saturate(1.1)}
.brand-txt{min-width:0}
.board-title{
  border:0;background:transparent;font-size:18px;font-weight:750;letter-spacing:-.01em;
  padding:2px 6px;border-radius:8px;max-width:46vw;width:auto;
}
.board-title:hover{background:var(--surface-3)}
.board-title:focus{outline:2px solid var(--brand);background:var(--surface)}
.brand-sub{font-size:12px;color:var(--muted);padding-left:6px;margin-top:-1px}
.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.search{display:flex;align-items:center;gap:6px;background:var(--surface-3);
  border:1px solid var(--border);border-radius:10px;padding:6px 10px;min-width:210px}
.search:focus-within{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
.search-ic{opacity:.55;font-size:13px}
.search input{border:0;background:transparent;outline:0;width:100%;font-size:13.5px}
.btn{
  display:inline-flex;align-items:center;gap:6px;cursor:pointer;white-space:nowrap;
  background:var(--surface);border:1px solid var(--border-strong);color:var(--text);
  padding:8px 12px;border-radius:10px;font-size:13.5px;font-weight:600;
  transition:background .12s,border-color .12s,transform .06s,box-shadow .12s;
}
.btn:hover{background:var(--surface-3)}
.btn:active{transform:translateY(1px)}
.btn--icon{padding:8px 10px}
.btn--primary{background:var(--brand);border-color:var(--brand);color:#fff}
.btn--primary:hover{background:var(--brand-ink)}
.btn--ghost{background:transparent;border-color:transparent}
.btn--ghost:hover{background:var(--surface-3)}
.btn--danger{color:#fff;background:var(--danger);border-color:var(--danger)}
.btn--sync .sync-dot{width:9px;height:9px;border-radius:50%;background:var(--faint);box-shadow:0 0 0 3px transparent}
.sync-dot.is-local{background:var(--faint)}
.sync-dot.is-on{background:var(--ok);box-shadow:0 0 0 3px color-mix(in srgb,var(--ok) 25%,transparent)}
.sync-dot.is-busy{background:var(--info);animation:pulse 1s infinite}
.sync-dot.is-err{background:var(--danger)}
@keyframes pulse{50%{opacity:.35}}

/* ---------- Métricas / KPIs ---------- */
.metrics{display:flex;gap:10px;padding:12px 18px 2px;flex-wrap:wrap}
.tile{
  flex:1 1 150px;min-width:132px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:12px 14px;box-shadow:var(--shadow);position:relative;overflow:hidden;
}
.tile::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--tc,var(--brand))}
.tile .num{font-size:26px;font-weight:800;line-height:1;letter-spacing:-.02em}
.tile .lbl{font-size:12px;color:var(--muted);margin-top:5px;font-weight:600}
.tile--total{--tc:var(--brand)} .tile--danger{--tc:var(--danger)}
.tile--warn{--tc:var(--warn)} .tile--info{--tc:var(--info)} .tile--ok{--tc:var(--ok)}
.tile.clickable{cursor:pointer} .tile.clickable:hover{border-color:var(--border-strong)}

/* ---------- Barra de filtros ---------- */
.filterbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:10px 18px;margin:0 0 -4px}
.filterbar .fb-lbl{font-size:12px;color:var(--muted);font-weight:700;margin-right:2px}
.filterbar select{background:var(--surface);border:1px solid var(--border-strong);border-radius:9px;padding:6px 8px;font-size:13px}
.fchip{cursor:pointer;border:1px solid var(--border-strong);background:var(--surface);border-radius:999px;
  padding:5px 11px;font-size:12.5px;font-weight:600;display:inline-flex;align-items:center;gap:6px}
.fchip .dot{width:9px;height:9px;border-radius:50%}
.fchip.on{border-color:transparent;color:#fff}
.fb-toggle{cursor:pointer;border:1px solid var(--border-strong);background:var(--surface);border-radius:9px;padding:6px 10px;font-size:13px;font-weight:600}
.fb-toggle.on{background:var(--danger);border-color:var(--danger);color:#fff}

/* ---------- Board ---------- */
.board-wrap{flex:1;overflow:auto;padding:10px 18px 22px}
.board{display:flex;gap:14px;align-items:flex-start;min-height:100%}
.column{
  flex:0 0 var(--col-w);width:var(--col-w);background:var(--surface-2);
  border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;
  max-height:calc(100dvh - 210px);box-shadow:var(--shadow);
}
.column.is-done{background:color-mix(in srgb,var(--ok) 7%,var(--surface-2))}
.column-header{
  display:flex;align-items:center;gap:8px;padding:11px 12px;cursor:grab;
  border-bottom:1px solid var(--border);border-top:3px solid var(--col,var(--brand));
  border-radius:var(--radius) var(--radius) 0 0;
}
.column-header:active{cursor:grabbing}
.col-emoji{font-size:16px}
.col-title{font-weight:750;font-size:14px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  border:0;background:transparent;padding:2px 4px;border-radius:6px}
.col-title:focus{outline:2px solid var(--brand);background:var(--surface)}
.col-count{font-size:12px;font-weight:800;color:var(--muted);background:var(--surface-3);border-radius:999px;padding:2px 9px;min-width:24px;text-align:center}
.col-wip{font-size:11.5px;color:var(--faint);font-weight:700}
.col-wip.over{color:#fff;background:var(--danger);border-radius:999px;padding:1px 7px}
.col-btn{cursor:pointer;border:0;background:transparent;color:var(--muted);border-radius:7px;padding:3px 6px;font-size:15px;line-height:1}
.col-btn:hover{background:var(--surface-3);color:var(--text)}
.cards{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:9px;min-height:24px}
.cards::-webkit-scrollbar{width:9px}.cards::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:8px;border:2px solid transparent;background-clip:padding-box}
.add-card{margin:2px 10px 12px;border:1px dashed var(--border-strong);background:transparent;color:var(--muted);
  border-radius:10px;padding:9px;cursor:pointer;font-weight:650;font-size:13px}
.add-card:hover{background:var(--surface-3);color:var(--text);border-color:var(--brand)}

/* ---------- Card ---------- */
.card{
  background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--prio,var(--border-strong));
  border-radius:var(--radius-sm);padding:10px 11px 9px;box-shadow:var(--shadow);cursor:pointer;position:relative;
  transition:box-shadow .12s,border-color .12s,transform .06s;
}
.card:hover{box-shadow:var(--shadow-lg);border-color:var(--border-strong)}
.card.is-hidden{display:none}
.card-menu{position:absolute;top:6px;right:6px;opacity:0;border:0;background:var(--surface-3);color:var(--muted);
  border-radius:7px;width:24px;height:24px;cursor:pointer;font-size:14px;line-height:1;display:grid;place-items:center}
.card:hover .card-menu{opacity:1}
.card-menu:hover{color:var(--text)}
.card-labels{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
.chip{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;line-height:1.5;
  background:color-mix(in srgb,var(--c) 16%,transparent);color:var(--c);border:1px solid color-mix(in srgb,var(--c) 32%,transparent)}
[data-theme="dark"] .chip{color:color-mix(in srgb,var(--c) 78%,white)}
.card-title{font-size:14px;font-weight:650;line-height:1.32;letter-spacing:-.005em;word-break:break-word;padding-right:20px}
.card-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:6px}
.card-tipo{font-size:11px;font-weight:700;color:var(--brand-ink);background:var(--brand-soft);padding:1px 7px;border-radius:6px}
[data-theme="dark"] .card-tipo{color:var(--brand)}
.card-proto{font-size:11px;color:var(--faint);font-weight:600;font-variant-numeric:tabular-nums}
.card-foot{display:flex;align-items:center;gap:8px;margin-top:9px;flex-wrap:wrap}
.due{font-size:11px;font-weight:700;padding:2px 7px;border-radius:7px;display:inline-flex;align-items:center;gap:4px;
  background:var(--surface-3);color:var(--muted)}
.due--overdue{background:color-mix(in srgb,var(--danger) 16%,transparent);color:var(--danger)}
.due--today,.due--soon{background:color-mix(in srgb,var(--warn) 18%,transparent);color:var(--warn)}
.checkprog{font-size:11px;font-weight:700;color:var(--muted);display:inline-flex;align-items:center;gap:3px}
.checkprog.done{color:var(--ok)}
.spacer{flex:1}
.avatar{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;font-size:10.5px;font-weight:800;color:#fff;
  background:var(--c,var(--faint));box-shadow:0 0 0 2px var(--surface)}
.prio-dot{width:9px;height:9px;border-radius:50%;background:var(--prio,var(--faint))}

/* estados de arraste (SortableJS) */
.sortable-ghost{opacity:.35;background:var(--brand-soft)!important}
.sortable-chosen{box-shadow:var(--shadow-lg)}
.sortable-drag{transform:rotate(1.5deg)}
.cards.drop-hint{outline:2px dashed var(--brand);outline-offset:-4px;border-radius:10px}

/* ---------- Modal ---------- */
.modal-backdrop,.drawer-backdrop{position:fixed;inset:0;background:rgba(8,15,30,.5);backdrop-filter:blur(2px);
  display:flex;z-index:60;animation:fade .12s}
@keyframes fade{from{opacity:0}}
.modal-backdrop{align-items:flex-start;justify-content:center;padding:5vh 16px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow-lg);
  width:min(620px,100%);max-height:90dvh;overflow:auto;animation:pop .14s}
@keyframes pop{from{transform:translateY(8px) scale(.98);opacity:.6}}
.modal-head{display:flex;align-items:flex-start;gap:10px;padding:16px 18px 8px;position:sticky;top:0;background:var(--surface)}
.modal-head .m-title{flex:1;font-size:17px;font-weight:750;border:0;background:var(--surface-3);border-radius:10px;padding:9px 11px;width:100%}
.modal-head .m-title:focus{outline:2px solid var(--brand);background:var(--surface)}
.modal-body{padding:6px 18px 18px;display:flex;flex-direction:column;gap:14px}
.field{display:flex;flex-direction:column;gap:6px}
.field > label{font-size:12px;font-weight:750;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
.field input[type=text],.field input[type=date],.field select,.field textarea{
  background:var(--surface-2);border:1px solid var(--border-strong);border-radius:10px;padding:9px 11px;font-size:14px;width:100%}
.field textarea{min-height:76px;resize:vertical;line-height:1.45}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--brand);border-color:var(--brand)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.chips-pick{display:flex;flex-wrap:wrap;gap:7px}
.pchip{cursor:pointer;border:1px solid var(--border-strong);border-radius:999px;padding:5px 11px;font-size:12.5px;font-weight:700;
  background:var(--surface-2);color:var(--muted);display:inline-flex;align-items:center;gap:6px}
.pchip .dot{width:10px;height:10px;border-radius:50%}
.pchip.on{color:#fff;border-color:transparent}
.checklist{display:flex;flex-direction:column;gap:6px}
.cl-item{display:flex;align-items:center;gap:9px;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:7px 9px}
.cl-item input[type=checkbox]{width:17px;height:17px;accent-color:var(--brand)}
.cl-item .cl-txt{flex:1;border:0;background:transparent;font-size:13.5px}
.cl-item .cl-txt.done{text-decoration:line-through;color:var(--faint)}
.cl-add{display:flex;gap:8px}
.cl-add input{flex:1}
.cl-bar{height:6px;border-radius:99px;background:var(--surface-3);overflow:hidden}
.cl-bar > i{display:block;height:100%;background:var(--ok);border-radius:99px;transition:width .2s}
.modal-foot{display:flex;gap:10px;align-items:center;padding:14px 18px 18px;position:sticky;bottom:0;background:var(--surface);border-top:1px solid var(--border)}

/* ---------- Drawer ---------- */
.drawer-backdrop{justify-content:flex-end}
.drawer{background:var(--surface);border-left:1px solid var(--border);width:min(430px,100%);height:100%;overflow:auto;
  box-shadow:var(--shadow-lg);animation:slide .16s;display:flex;flex-direction:column}
@keyframes slide{from{transform:translateX(24px);opacity:.5}}
.drawer-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:16px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:2}
.drawer-head h3{margin:0;font-size:16px;font-weight:750}
.drawer-body{padding:16px 18px;display:flex;flex-direction:column;gap:14px}
.note{font-size:13px;color:var(--muted);line-height:1.5}
.note code{background:var(--surface-3);padding:1px 6px;border-radius:6px;font-size:12px}
.tpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tpl{cursor:pointer;text-align:left;border:1px solid var(--border-strong);background:var(--surface-2);border-radius:12px;padding:11px;display:flex;flex-direction:column;gap:4px}
.tpl:hover{border-color:var(--brand);background:var(--surface-3)}
.tpl b{font-size:13.5px} .tpl small{color:var(--muted);font-size:11.5px}
.list-row{display:flex;align-items:center;gap:10px;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:8px 10px}
.list-row input[type=text]{flex:1;border:0;background:transparent;font-size:13.5px}
.swatch{width:20px;height:20px;border-radius:6px;border:1px solid var(--border-strong);cursor:pointer}
.mini{font-size:12px;font-weight:700;padding:5px 9px;border-radius:8px;border:1px solid var(--border-strong);background:var(--surface);cursor:pointer}
.mini:hover{background:var(--surface-3)}
.divider{height:1px;background:var(--border);margin:2px 0}

/* ---------- Toast ---------- */
.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:80;
  background:#0f1826;color:#fff;border-radius:12px;padding:11px 15px;box-shadow:var(--shadow-lg);
  display:flex;align-items:center;gap:14px;font-size:13.5px;font-weight:600;animation:pop .14s}
[data-theme="dark"] .toast{background:#e8eef6;color:#0f1826}
.toast button{border:0;background:transparent;color:var(--brand);font-weight:800;cursor:pointer;font-size:13.5px}
[data-theme="dark"] .toast button{color:var(--brand-ink)}

/* ---------- Statusbar ---------- */
.statusbar{padding:6px 18px;font-size:11.5px;color:var(--faint);border-top:1px solid var(--border);background:var(--surface);
  display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}
.statusbar a{color:var(--muted)}

/* ---------- Responsivo (tablet / celular) ---------- */
@media (max-width:900px){
  .brand-sub{display:none}
  .search{min-width:150px}
}
@media (max-width:640px){
  .topbar{padding:10px 12px;gap:8px;flex-wrap:wrap}
  .brand{flex:1 1 100%;min-width:0}
  .brand-mark{font-size:22px}
  .board-title{font-size:16px;max-width:72vw}
  .toolbar{gap:6px;flex:1 1 100%;justify-content:flex-start}
  .search{order:-1;flex:1 1 100%;min-width:0}
  .btn{padding:9px 11px;font-size:13px}
  .metrics{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:10px 12px 4px;scrollbar-width:none}
  .metrics::-webkit-scrollbar{display:none}
  .tile{flex:0 0 46%;min-width:150px}
  .board-wrap{padding:10px 12px 18px;scroll-snap-type:x proximity}
  .board{gap:12px}
  .column{flex-basis:86vw;width:86vw;max-width:380px;scroll-snap-align:center;
    max-height:calc(100dvh - 214px)}
  .card{padding:12px 12px 11px}         /* alvos de toque maiores */
  .card-title{font-size:14.5px}
  .add-card{padding:11px}
  .modal-backdrop{padding:0}
  .modal{width:100%;max-height:100dvh;border-radius:16px 16px 0 0}
  .drawer{width:100%}
  .col-btn,.card-menu{width:30px;height:30px}
}
@media (max-width:640px) and (display-mode:standalone){
  /* quando instalado como app na tela inicial */
  .app{height:100dvh}
}
/* dispositivos de toque: não depender de :hover para ações do card */
@media (hover:none){
  .card-menu{opacity:1}
}

</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">🧫</span>
      <div class="brand-txt">
        <input id="boardTitle" class="board-title" value="Bancada de Microbiologia" aria-label="Título do quadro">
        <div class="brand-sub">Gestão visual · amostras, análises, leituras e resultados</div>
      </div>
    </div>
    <div class="toolbar">
      <label class="search">
        <span class="search-ic">🔎</span>
        <input id="search" type="search" placeholder="Buscar amostra, protocolo, nota…" aria-label="Buscar">
      </label>
      <button id="btnFilters" class="btn" type="button">⚙︎ Filtros</button>
      <button id="btnTemplates" class="btn" type="button">✨ Modelos</button>
      <button id="btnAddColumn" class="btn" type="button">＋ Coluna</button>
      <button id="btnSync" class="btn btn--sync" type="button"><span id="syncDot" class="sync-dot"></span> Sincronizar</button>
      <button id="btnMenu" class="btn" type="button" aria-label="Mais">⋯</button>
      <button id="btnTheme" class="btn btn--icon" type="button" aria-label="Alternar tema" title="Tema claro/escuro">🌙</button>
    </div>
  </header>

  <section class="metrics" id="metrics" aria-label="Indicadores"></section>

  <div class="filterbar" id="filterbar" hidden></div>

  <main class="board-wrap">
    <div class="board" id="board"></div>
  </main>

  <footer class="statusbar" id="statusbar"></footer>
</div>

<div id="modalRoot"></div>
<div id="drawerRoot"></div>
<div class="toast" id="toast" hidden></div>

<script>
/* ============================================================
   Kanban Bancada de Microbiologia
   App single-file, sem framework. Arrastar-soltar via SortableJS.
   Persistência local (localStorage) + sincronização opcional (GitHub).
   ============================================================ */
(function () {
  'use strict';

  /* ---------- Config de sincronização (opcional; preenchida se houver servidor) ----------
     Deixe vazio para funcionar 100% local (salva no navegador + backup por arquivo).
     Para ligar sync em tempo real, aponte url p/ um endpoint que aceite GET/PUT JSON. */
  const SYNC_CFG = { url: '' };
  const SYNC_READY = !!SYNC_CFG.url && !SYNC_CFG.url.startsWith('__');

  /* ---------- Chaves e constantes ---------- */
  const LS_KEY = 'kanban_micro_v1';
  const LS_TOKEN = 'kanban_micro_token';
  const LS_THEME = 'kanban_micro_theme';
  const PALETTE = ['#e11d48','#f97316','#f59e0b','#eab308','#22c55e','#14b8a6','#0ea5e9','#3b82f6','#6366f1','#a855f7','#ec4899','#64748b'];
  const PRIOS = { alta:{label:'Alta',color:'#e11d48'}, media:{label:'Média',color:'#f59e0b'}, baixa:{label:'Baixa',color:'#3b82f6'} };

  /* ---------- Utilidades ---------- */
  const $ = (s, r=document) => r.querySelector(s);
  const el = (tag, cls, html) => { const n=document.createElement(tag); if(cls)n.className=cls; if(html!=null)n.innerHTML=html; return n; };
  const uid = p => (p||'id')+'_'+Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-3);
  const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const debounce=(fn,ms)=>{let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};};

  const today0 = () => { const d=new Date(); d.setHours(0,0,0,0); return d; };
  const parseDue = s => { if(!s) return null; const p=s.split('-').map(Number); const d=new Date(p[0],p[1]-1,p[2]); d.setHours(0,0,0,0); return d; };
  const daysUntil = s => { const d=parseDue(s); return d==null?null:Math.round((d-today0())/864e5); };
  const isoOffset = n => { const d=today0(); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); };
  const fmtDue = s => { const d=parseDue(s); return d?d.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'2-digit'}).replace('.',''):''; };
  const initials = n => (n||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase();

  /* ---------- Estado ---------- */
  let board = load() || seed();
  migrate(board);
  let filters = { text:'', labels:new Set(), member:'', prio:'', overdue:false };
  let filtersOpen = false;
  let undo = null;

  /* ---------- Semente (fluxo de microbiologia) ---------- */
  function seed() {
    const L = (name,color)=>({id:uid('lb'),name,color});
    const labels = [
      L('Hemocultura','#e11d48'), L('Urocultura','#f59e0b'), L('Coprocultura','#a855f7'),
      L('Secreção','#ec4899'), L('Água','#0ea5e9'), L('Alimento','#22c55e'),
      L('Antibiograma','#14b8a6'), L('Fungos','#6366f1'), L('Vigilância','#64748b')
    ];
    const li = n => labels.find(x=>x.name===n).id;
    const members = [
      {id:uid('mb'),name:'Fernanda',color:'#0d9488'},
      {id:uid('mb'),name:'Téc. Ana',color:'#6366f1'},
      {id:uid('mb'),name:'Téc. Bruno',color:'#f97316'},
      {id:uid('mb'),name:'Revisão',color:'#64748b'}
    ];
    const mb = n => members.find(x=>x.name===n).id;

    const templates = [
      {id:uid('tp'),name:'Hemocultura',emoji:'🩸',tipo:'Hemocultura',label:'Hemocultura',prio:'alta',
        checklist:['Registrar coleta/frascos','Incubar (até 5 dias)','Leitura diária no equipamento','Gram ao sinalizar positivo','Subcultivo em meios','Identificação (MALDI/bioquímica)','Antibiograma','Validar resultado','Liberar laudo']},
      {id:uid('tp'),name:'Urocultura',emoji:'💧',tipo:'Urocultura',label:'Urocultura',prio:'media',
        checklist:['Semeadura quantitativa (alça calibrada)','Incubar 24–48 h','Contagem de UFC/mL','Identificação','Antibiograma','Validar','Laudo']},
      {id:uid('tp'),name:'Coprocultura',emoji:'🧫',tipo:'Coprocultura',label:'Coprocultura',prio:'media',
        checklist:['Semeadura em meios seletivos','Incubar 24–48 h','Triagem de colônias suspeitas','Provas bioquímicas','Sorologia (Salmonella/Shigella)','Antibiograma','Laudo']},
      {id:uid('tp'),name:'Cultura de água',emoji:'🚰',tipo:'Água',label:'Água',prio:'media',
        checklist:['Registro da coleta','Filtração por membrana','Incubação','Contagem (coliformes / E. coli)','Interpretação (VMP)','Laudo']},
      {id:uid('tp'),name:'Cultura de alimentos',emoji:'🍽️',tipo:'Alimento',label:'Alimento',prio:'media',
        checklist:['Pesagem e diluições','Plaqueamento','Incubação','Contagem','Pesquisa de patógenos','Interpretação','Laudo']},
      {id:uid('tp'),name:'Antibiograma',emoji:'🧪',tipo:'Antibiograma',label:'Antibiograma',prio:'alta',
        checklist:['Preparar inóculo (0,5 McFarland)','Disco-difusão / CIM','Incubar 16–18 h','Medir halos / ler CIM','Interpretar (BrCAST/CLSI)','Laudo']},
      {id:uid('tp'),name:'Coloração de Gram',emoji:'🔬',tipo:'Gram',label:'',prio:'baixa',
        checklist:['Preparar esfregaço','Corar (Gram)','Leitura microscópica','Registrar morfologia','Laudo']},
      {id:uid('tp'),name:'Controle de qualidade',emoji:'✅',tipo:'CQ',label:'Vigilância',prio:'baixa',
        checklist:['Cepa ATCC de referência','Executar teste','Registrar resultado','Conferir faixa esperada','Arquivar registro']}
    ];

    const C = (title,emoji,extra)=>Object.assign({id:uid('col'),title,emoji,wip:0,cards:[]},extra||{});
    const columns = [
      C('Recebido','📥'),
      C('Semeadura / Preparo','🧫'),
      C('Incubação','⏳',{wait:true}),
      C('Leitura / Análise','🔬'),
      C('Resultado / Revisão','📝',{wip:6}),
      C('Concluído','✅',{done:true})
    ];

    const card = (o)=>Object.assign({id:uid('c'),title:'',tipo:'',protocolo:'',notes:'',labelIds:[],prio:'',due:'',memberId:'',checklist:[],createdAt:new Date().toISOString()},o);
    const ck = arr => arr.map(t=>({id:uid('k'),text:t,done:false}));

    columns[0].cards = [
      card({title:'Amostra 2026-0456 — Hemocultura (UTI, leito 12)',tipo:'Hemocultura',protocolo:'2026-0456',labelIds:[li('Hemocultura')],prio:'alta',due:isoOffset(0),memberId:mb('Fernanda'),checklist:ck(['Registrar coleta','Conferir frascos'])}),
      card({title:'Amostra 2026-0457 — Urocultura ambulatorial',tipo:'Urocultura',protocolo:'2026-0457',labelIds:[li('Urocultura')],prio:'media',due:isoOffset(1),memberId:mb('Téc. Ana')})
    ];
    columns[1].cards = [
      card({title:'Amostra 2026-0451 — Coprocultura',tipo:'Coprocultura',protocolo:'2026-0451',labelIds:[li('Coprocultura')],prio:'media',due:isoOffset(2),memberId:mb('Téc. Bruno'),checklist:ck(['Semeadura em meios seletivos','Identificar suspeitas'])})
    ];
    columns[2].cards = [
      card({title:'Amostra 2026-0448 — Hemocultura (pediatria)',tipo:'Hemocultura',protocolo:'2026-0448',labelIds:[li('Hemocultura'),li('Vigilância')],prio:'alta',due:isoOffset(-1),memberId:mb('Fernanda'),notes:'Frascos em incubadora automatizada. Leitura diária.',checklist:ck(['Leitura dia 1','Leitura dia 2','Leitura dia 3'])}),
      card({title:'Análise de água 2026-0440 — poço artesiano',tipo:'Água',protocolo:'2026-0440',labelIds:[li('Água')],prio:'media',due:isoOffset(1),memberId:mb('Téc. Ana'),checklist:ck(['Filtração por membrana','Incubar 24h'])})
    ];
    columns[3].cards = [
      card({title:'Amostra 2026-0445 — Urocultura positiva → antibiograma',tipo:'Antibiograma',protocolo:'2026-0445',labelIds:[li('Urocultura'),li('Antibiograma')],prio:'alta',due:isoOffset(0),memberId:mb('Fernanda'),checklist:ck(['Inóculo 0,5 McFarland','Disco-difusão','Medir halos','Interpretar BrCAST'])}),
      card({title:'Amostra 2026-0442 — Cultura de alimento (surto)',tipo:'Alimento',protocolo:'2026-0442',labelIds:[li('Alimento'),li('Vigilância')],prio:'alta',due:isoOffset(-2),memberId:mb('Téc. Bruno'),notes:'Pesquisa de Salmonella e Staphylococcus.'})
    ];
    columns[4].cards = [
      card({title:'Amostra 2026-0438 — Secreção de ferida',tipo:'Secreção',protocolo:'2026-0438',labelIds:[li('Secreção'),li('Antibiograma')],prio:'media',due:isoOffset(2),memberId:mb('Revisão'),checklist:ck(['Redigir laudo','Conferência técnica','Assinatura'])})
    ];
    columns[5].cards = [
      card({title:'Amostra 2026-0431 — Urocultura (negativa)',tipo:'Urocultura',protocolo:'2026-0431',labelIds:[li('Urocultura')],prio:'baixa',memberId:mb('Fernanda')}),
      card({title:'Amostra 2026-0430 — Hemocultura (negativa 5 dias)',tipo:'Hemocultura',protocolo:'2026-0430',labelIds:[li('Hemocultura')],prio:'baixa',memberId:mb('Téc. Ana')})
    ];

    return { schema:2, title:'Bancada de Microbiologia', labels, members, templates, columns, updatedAt:new Date().toISOString() };
  }

  function migrate(b){
    b.labels=b.labels||[]; b.members=b.members||[]; b.templates=b.templates||[]; b.columns=b.columns||[];
    b.columns.forEach(c=>{ c.cards=c.cards||[]; c.cards.forEach(k=>{k.labelIds=k.labelIds||[];k.checklist=k.checklist||[];}); });
  }

  /* ---------- Persistência local ---------- */
  function load(){ try{ const s=localStorage.getItem(LS_KEY); return s?JSON.parse(s):null; }catch(e){ return null; } }
  const persistLocal = () => { try{ localStorage.setItem(LS_KEY, JSON.stringify(board)); }catch(e){} };
  function touched(){ board.updatedAt=new Date().toISOString(); persistLocal(); scheduleSync(); renderMetrics(); }

  /* ---------- Lookups ---------- */
  const labelById = id => board.labels.find(l=>l.id===id);
  const memberById = id => board.members.find(m=>m.id===id);
  const findCard = id => { for(const c of board.columns){ const k=c.cards.find(x=>x.id===id); if(k) return {card:k,col:c}; } return null; };
  const colById = id => board.columns.find(c=>c.id===id);

  /* ---------- Filtro ---------- */
  function matches(card){
    if(filters.text){ const t=filters.text.toLowerCase();
      const hay=(card.title+' '+card.tipo+' '+card.protocolo+' '+card.notes+' '+card.labelIds.map(i=>labelById(i)?.name||'').join(' ')).toLowerCase();
      if(!hay.includes(t)) return false; }
    if(filters.labels.size && !card.labelIds.some(i=>filters.labels.has(i))) return false;
    if(filters.member && card.memberId!==filters.member) return false;
    if(filters.prio && card.prio!==filters.prio) return false;
    if(filters.overdue){ const d=daysUntil(card.due); const col=findCard(card.id)?.col; if(!(d!=null&&d<0&&!(col&&col.done))) return false; }
    return true;
  }

  /* ---------- Render ---------- */
  function render(){ renderMetrics(); renderFilterbar(); renderBoard(); }

  function renderMetrics(){
    const box=$('#metrics'); const all=[]; board.columns.forEach(c=>c.cards.forEach(k=>all.push({k,c})));
    const overdue=all.filter(({k,c})=>{const d=daysUntil(k.due);return d!=null&&d<0&&!c.done;}).length;
    const todayN=all.filter(({k,c})=>daysUntil(k.due)===0&&!c.done).length;
    const incub=all.filter(({c})=>c.wait).length;
    const done=all.filter(({c})=>c.done).length;
    const active=all.length-done;
    const tiles=[
      {c:'total',n:active,l:'Amostras ativas'},
      {c:'danger',n:overdue,l:'Atrasadas',f:'overdue'},
      {c:'warn',n:todayN,l:'Para hoje'},
      {c:'info',n:incub,l:'Em incubação'},
      {c:'ok',n:done,l:'Concluídas'}
    ];
    box.innerHTML='';
    tiles.forEach(t=>{ const d=el('div','tile tile--'+t.c+(t.f?' clickable':''),`<div class="num">${t.n}</div><div class="lbl">${t.l}</div>`);
      if(t.f){ d.onclick=()=>{ filters.overdue=!filters.overdue; filtersOpen=true; render(); }; } box.appendChild(d); });
  }

  function renderFilterbar(){
    const bar=$('#filterbar'); bar.hidden=!filtersOpen; if(!filtersOpen){bar.innerHTML='';return;}
    bar.innerHTML=''; bar.appendChild(el('span','fb-lbl','Etiquetas:'));
    board.labels.forEach(l=>{ const on=filters.labels.has(l.id);
      const c=el('button','fchip'+(on?' on':''),`<span class="dot" style="background:${l.color}"></span>${esc(l.name)}`);
      c.style.cssText=on?`background:${l.color};box-shadow:0 0 0 1px ${l.color}`:''; c.onclick=()=>{ on?filters.labels.delete(l.id):filters.labels.add(l.id); render(); };
      bar.appendChild(c); });
    const mSel=el('select'); mSel.innerHTML='<option value="">Responsável…</option>'+board.members.map(m=>`<option value="${m.id}" ${filters.member===m.id?'selected':''}>${esc(m.name)}</option>`).join('');
    mSel.onchange=e=>{filters.member=e.target.value;render();}; bar.appendChild(mSel);
    const pSel=el('select'); pSel.innerHTML='<option value="">Prioridade…</option>'+Object.entries(PRIOS).map(([k,v])=>`<option value="${k}" ${filters.prio===k?'selected':''}>${v.label}</option>`).join('');
    pSel.onchange=e=>{filters.prio=e.target.value;render();}; bar.appendChild(pSel);
    const ov=el('button','fb-toggle'+(filters.overdue?' on':''),'⏰ Só atrasadas'); ov.onclick=()=>{filters.overdue=!filters.overdue;render();}; bar.appendChild(ov);
    const clr=el('button','fb-toggle','✕ Limpar'); clr.onclick=()=>{filters={text:filters.text,labels:new Set(),member:'',prio:'',overdue:false};$('#search').value=filters.text;render();}; bar.appendChild(clr);
  }

  function cardEl(card, col){
    const node=el('div','card'); node.dataset.id=card.id;
    if(card.prio) node.style.setProperty('--prio', PRIOS[card.prio].color);
    // etiquetas
    if(card.labelIds.length){ const lb=el('div','card-labels');
      card.labelIds.forEach(id=>{const l=labelById(id); if(l){const ch=el('span','chip',esc(l.name)); ch.style.setProperty('--c',l.color); lb.appendChild(ch);} });
      node.appendChild(lb); }
    node.appendChild(el('div','card-title',esc(card.title||'(sem título)')));
    if(card.tipo||card.protocolo){ const m=el('div','card-meta');
      if(card.tipo) m.appendChild(el('span','card-tipo',esc(card.tipo)));
      if(card.protocolo) m.appendChild(el('span','card-proto','#'+esc(card.protocolo)));
      node.appendChild(m); }
    const foot=el('div','card-foot');
    if(card.due){ const d=daysUntil(card.due); let cls='',txt=fmtDue(card.due);
      if(!col.done){ if(d<0){cls='due--overdue';txt='Atrasada · '+Math.abs(d)+'d';} else if(d===0){cls='due--today';txt='Hoje';} else if(d===1){cls='due--soon';txt='Amanhã';} else if(d<=2){cls='due--soon';} }
      foot.appendChild(el('span','due '+cls,'🕒 '+txt)); }
    if(card.checklist.length){ const done=card.checklist.filter(x=>x.done).length;
      foot.appendChild(el('span','checkprog'+(done===card.checklist.length?' done':''),'✓ '+done+'/'+card.checklist.length)); }
    foot.appendChild(el('span','spacer'));
    if(card.prio) { const p=el('span','prio-dot'); p.style.setProperty('--prio',PRIOS[card.prio].color); p.title='Prioridade '+PRIOS[card.prio].label; foot.appendChild(p); }
    const mem=memberById(card.memberId); if(mem){ const av=el('span','avatar',initials(mem.name)); av.style.setProperty('--c',mem.color); av.title=mem.name; foot.appendChild(av); }
    node.appendChild(foot);
    const menu=el('button','card-menu','⋯'); menu.title='Ações'; menu.onclick=e=>{e.stopPropagation();cardQuickMenu(card,col,e);}; node.appendChild(menu);
    node.onclick=()=>openCard(card.id);
    if(!matches(card)) node.classList.add('is-hidden');
    return node;
  }

  function columnEl(col){
    const sec=el('section','column'+(col.done?' is-done':'')); sec.dataset.id=col.id;
    const accent = col.done?'var(--ok)':(col.wait?'var(--info)':'var(--brand)');
    sec.style.setProperty('--col', accent);
    const head=el('header','column-header');
    head.appendChild(el('span','col-emoji',col.emoji||'•'));
    const title=el('input','col-title'); title.value=col.title; title.spellcheck=false;
    title.onchange=()=>{col.title=title.value.trim()||'Coluna';touched();};
    title.onclick=e=>e.stopPropagation();
    head.appendChild(title);
    const visible=col.cards.filter(matches).length;
    head.appendChild(el('span','col-count',String(visible)));
    if(col.wip>0){ const w=el('span','col-wip'+(col.cards.length>col.wip?' over':''),'/'+col.wip); head.appendChild(w); }
    const add=el('button','col-btn','＋'); add.title='Adicionar amostra'; add.onclick=e=>{e.stopPropagation();quickAdd(col.id);}; head.appendChild(add);
    const mn=el('button','col-btn','⋯'); mn.title='Opções da coluna'; mn.onclick=e=>{e.stopPropagation();columnMenu(col,e);}; head.appendChild(mn);
    sec.appendChild(head);
    const cards=el('div','cards'); cards.dataset.col=col.id;
    col.cards.forEach(c=>cards.appendChild(cardEl(c,col)));
    sec.appendChild(cards);
    const addBtn=el('button','add-card','＋ Adicionar amostra'); addBtn.onclick=()=>quickAdd(col.id);
    sec.appendChild(addBtn);
    return sec;
  }

  function renderBoard(){
    const b=$('#board'); b.innerHTML='';
    board.columns.forEach(col=>b.appendChild(columnEl(col)));
    // botão nova coluna
    const addCol=el('button','btn btn--ghost','＋ Nova coluna'); addCol.style.cssText='align-self:flex-start;margin-top:6px;height:44px';
    addCol.onclick=addColumn; b.appendChild(addCol);
    initSortables();
  }

  /* ---------- Contagens sem rebuild (durante o arraste) ---------- */
  function refreshCounts(){
    board.columns.forEach(col=>{
      const sec=document.querySelector('.column[data-id="'+col.id+'"]'); if(!sec) return;
      sec.querySelector('.col-count').textContent=String(col.cards.filter(matches).length);
      const w=sec.querySelector('.col-wip'); if(w){ w.textContent='/'+col.wip; w.classList.toggle('over',col.cards.length>col.wip); }
    });
    renderMetrics();
  }

  /* ---------- SortableJS ---------- */
  let sortables=[];
  function initSortables(){
    sortables.forEach(s=>{try{s.destroy();}catch(e){}}); sortables=[];
    if(typeof Sortable==='undefined') return;
    // colunas
    sortables.push(Sortable.create($('#board'),{
      animation:150, handle:'.column-header', draggable:'.column', filter:'.col-btn,.col-title',
      onEnd:()=>{ const ids=[...document.querySelectorAll('.column')].map(n=>n.dataset.id);
        board.columns.sort((a,b)=>ids.indexOf(a.id)-ids.indexOf(b.id)); touched(); }
    }));
    // cards
    document.querySelectorAll('.cards').forEach(list=>{
      sortables.push(Sortable.create(list,{
        group:'cards', animation:150, draggable:'.card', ghostClass:'sortable-ghost', chosenClass:'sortable-chosen', dragClass:'sortable-drag',
        filter:'.card-menu', delay:80, delayOnTouchOnly:true, touchStartThreshold:6, fallbackTolerance:5,
        onAdd:syncFromDOM, onUpdate:syncFromDOM, onRemove:()=>{}
      }));
    });
  }
  function syncFromDOM(){
    const map={}; board.columns.forEach(c=>c.cards.forEach(k=>map[k.id]=k));
    board.columns.forEach(col=>{
      const list=document.querySelector('.cards[data-col="'+col.id+'"]'); if(!list) return;
      col.cards=[...list.querySelectorAll('.card')].map(n=>map[n.dataset.id]).filter(Boolean);
    });
    touched(); refreshCounts();
  }

  /* ---------- Ações de card ---------- */
  function quickAdd(colId){
    const col=colById(colId); if(!col) return;
    const c={id:uid('c'),title:'Nova amostra',tipo:'',protocolo:'',notes:'',labelIds:[],prio:'',due:'',memberId:'',checklist:[],createdAt:new Date().toISOString()};
    col.cards.push(c); touched(); renderBoard(); openCard(c.id);
  }
  function addFromTemplate(tpl, colId){
    const col=colById(colId)||board.columns[0];
    const lb=board.labels.find(l=>l.name===tpl.label);
    const c={id:uid('c'),title:tpl.name+' — nova amostra',tipo:tpl.tipo,protocolo:'',notes:'',labelIds:lb?[lb.id]:[],prio:tpl.prio||'',due:'',memberId:'',
      checklist:tpl.checklist.map(t=>({id:uid('k'),text:t,done:false})),createdAt:new Date().toISOString()};
    col.cards.unshift(c); touched(); closeDrawer(); renderBoard(); openCard(c.id);
    toast('Amostra criada a partir do modelo “'+tpl.name+'”.');
  }
  function deleteCard(id){
    const f=findCard(id); if(!f) return;
    const idx=f.col.cards.indexOf(f.card); const snap={col:f.col.id,idx,card:f.card};
    f.col.cards.splice(idx,1); touched(); renderBoard();
    undo={label:'Amostra excluída.',fn:()=>{const c=colById(snap.col)||board.columns[0];c.cards.splice(Math.min(snap.idx,c.cards.length),0,snap.card);touched();renderBoard();}};
    toast(undo.label,'Desfazer',()=>{undo.fn();undo=null;});
  }

  function cardQuickMenu(card,col,ev){
    popMenu(ev.currentTarget,[
      {t:'✏️ Abrir / editar',fn:()=>openCard(card.id)},
      {t:'📄 Duplicar',fn:()=>{const d=JSON.parse(JSON.stringify(card));d.id=uid('c');d.checklist.forEach(k=>k.id=uid('k'));col.cards.splice(col.cards.indexOf(card)+1,0,d);touched();renderBoard();}},
      {t:'➡️ Mover para…',sub:board.columns.filter(c=>c.id!==col.id).map(c=>({t:(c.emoji||'')+' '+c.title,fn:()=>{col.cards.splice(col.cards.indexOf(card),1);c.cards.push(card);touched();renderBoard();}}))},

        <button type="button" class="btn btn--danger m-del">🗑️ Excluir</button>

    function renderCL(){ clWrap.innerHTML='';

        const txt=el('input','cl-txt'+(item.done?' done':''));txt.value=item.text;txt.onchange=()=>item.text=txt.value;
        const del=el('button','col-btn','✕');del.onclick=()=>{card.checklist=card.checklist.filter(x=>x!==item);renderCL();};

    function bar(){ const d=card.checklist.filter(x=>x.done).length,t=card.checklist.length; clBar.style.width=(t?Math.round(d/t*100):0)+'%'; }
    renderCL();

  /* ---------- Menu popover ---------- */
  function popMenu(anchor,items){
    closePop(); const r=anchor.getBoundingClientRect();
    const pop=el('div','pop'); pop.style.cssText=`position:fixed;z-index:90;top:${r.bottom+6}px;left:${Math.min(r.left,innerWidth-230)}px;background:var(--surface);border:1px solid var(--border-strong);border-radius:12px;box-shadow:var(--shadow-lg);padding:6px;min-width:210px`;
    items.forEach(it=>{
      const b=el('button','',esc(it.t)); b.style.cssText=`display:block;width:100%;text-align:left;border:0;background:transparent;padding:9px 10px;border-radius:8px;cursor:pointer;font-size:13.5px;font-weight:600;color:${it.danger?'var(--danger)':'var(--text)'}`;
      b.onmouseenter=()=>b.style.background='var(--surface-3)'; b.onmouseleave=()=>b.style.background='transparent';
      b.onclick=()=>{ if(it.sub){ closePop(); popSub(b,it.sub); } else { closePop(); it.fn&&it.fn(); } };
      pop.appendChild(b); });
    document.body.appendChild(pop); setTimeout(()=>document.addEventListener('mousedown',popAway),0);
    pop._away=true; window._pop=pop;
  }
  function popSub(anchor,items){ popMenu(anchor,items); }
  function popAway(e){ if(window._pop && !window._pop.contains(e.target)) closePop(); }
  function closePop(){ if(window._pop){window._pop.remove();window._pop=null;document.removeEventListener('mousedown',popAway);} }

  /* ---------- Backup & Sincronização ----------
     Local-first: tudo é salvo no navegador. Backup por arquivo sempre disponível.
     Sync em tempo real (opcional) só liga quando SYNC_CFG.url está configurado. */
  let syncState='local';
  const getToken=()=>{try{return localStorage.getItem(LS_TOKEN)||'';}catch(e){return'';}};
  const setSyncDot=()=>{const d=$('#syncDot');if(!d)return;d.className='sync-dot '+({local:'is-local',on:'is-on',busy:'is-busy',err:'is-err'}[syncState]||'is-local');};
  async function apiGet(){ const r=await fetch(SYNC_CFG.url,{headers:{'x-pass':getToken()},cache:'no-store'});
    if(r.status===404)return null; if(!r.ok)throw new Error('GET '+r.status); const t=await r.text(); return t?JSON.parse(t):null; }
  async function apiPut(){ const r=await fetch(SYNC_CFG.url,{method:'PUT',headers:{'x-pass':getToken(),'Content-Type':'application/json'},body:JSON.stringify(board)});
    if(!r.ok)throw new Error('PUT '+r.status); }
  const scheduleSync=debounce(async()=>{ if(!SYNC_READY||!getToken())return; try{syncState='busy';setSyncDot();await apiPut();syncState='on';setSyncDot();stamp('sincronizado');}catch(e){syncState='err';setSyncDot();} },1200);
  async function pullSync(){ if(!SYNC_READY||!getToken())return; try{syncState='busy';setSyncDot();const remote=await apiGet(); if(remote&&remote.columns){board=remote;migrate(board);persistLocal();render();} syncState='on';setSyncDot();stamp('sincronizado');}catch(e){syncState='err';setSyncDot();} }
  async function safe(fn){ try{return await fn();}catch(e){toast('Erro de sincronização: '+e.message);return undefined;} }
  function drawerSync(){
    openDrawer('Backup & sincronização', body=>{
      body.appendChild(el('p','note','<b>Salvamento automático:</b> tudo o que a Fernanda edita já fica guardado neste navegador. Para levar a board para outro computador ou ter uma cópia de segurança, use o backup abaixo.'));
      const bk=el('div',''); bk.style.cssText='display:flex;gap:8px;flex-wrap:wrap';
      const be=el('button','btn btn--primary','⬇️ Baixar backup (JSON)'); be.onclick=exportJSON;
      const bi=el('button','btn','⬆️ Restaurar backup'); bi.onclick=importJSON;
      bk.append(be,bi); body.appendChild(bk);
      body.appendChild(el('div','divider'));
      body.appendChild(el('h4','','Sincronização em tempo real'));
      if(!SYNC_READY){
        body.appendChild(el('p','note','Ainda não ativada. Quando ligada, a mesma board fica sincronizada automaticamente entre vários computadores e pessoas — a Fernanda só abre o link e digita uma senha curta uma vez. É um passo rápido de configuração no servidor.'));
        return;
      }
      body.appendChild(el('p','note','Digite a <b>senha de equipe</b> uma vez neste computador. A partir daí a board sincroniza sozinha entre os dispositivos.'));
      const f=el('div','field'); f.innerHTML='<label>Senha de equipe</label>'; const inp=el('input');inp.type='password';inp.placeholder='••••••';inp.value=getToken(); f.appendChild(inp); body.appendChild(f);
      const row=el('div',''); row.style.cssText='display:flex;gap:8px;flex-wrap:wrap';
      const conn=el('button','btn btn--primary','Conectar & sincronizar'); conn.onclick=async()=>{try{localStorage.setItem(LS_TOKEN,inp.value.trim());}catch(e){} const remote=await safe(apiGet); if(remote===undefined)return; if(remote&&remote.columns){if(confirm('Já existe uma board na nuvem. Carregar a versão da nuvem? (Cancelar mantém a atual e envia para a nuvem.)')){board=remote;migrate(board);persistLocal();render();}else{await safe(apiPut);}}else{await safe(apiPut);} syncState='on';setSyncDot();closeDrawer();toast('Sincronização ligada.'); };
      const pull=el('button','btn','⤓ Puxar da nuvem'); pull.onclick=()=>{pullSync();closeDrawer();};
      const off=el('button','btn','Desligar'); off.onclick=()=>{try{localStorage.removeItem(LS_TOKEN);}catch(e){}syncState='local';setSyncDot();closeDrawer();toast('Sincronização desligada (dados continuam salvos localmente).');};
      row.append(conn,pull,off); body.appendChild(row);
    });
  }

  /* ---------- Export / Import ---------- */
  function exportJSON(){ const blob=new Blob([JSON.stringify(board,null,2)],{type:'application/json'});
    const a=el('a');a.href=URL.createObjectURL(blob);a.download='kanban-pericias-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(a.href); }
  function importJSON(){ const i=el('input');i.type='file';i.accept='.json,application/json';i.onchange=()=>{const fr=new FileReader();fr.onload=()=>{try{const d=JSON.parse(fr.result);if(!d.columns)throw 0;board=d;migrate(board);touched();render();closeDrawer();toast('Quadro importado.');}catch(e){toast('Arquivo inválido.');}};fr.readAsText(i.files[0]);};i.click(); }

  /* ---------- Toast ---------- */
  let toastT;
  function toast(msg,actionLabel,actionFn){ const t=$('#toast');clearTimeout(toastT);t.innerHTML='';t.append(el('span','',esc(msg)));
    if(actionLabel){const b=el('button','',esc(actionLabel));b.onclick=()=>{t.hidden=true;actionFn&&actionFn();};t.appendChild(b);} t.hidden=false;
    toastT=setTimeout(()=>t.hidden=true,actionLabel?7000:3200); }

  /* ---------- Statusbar ---------- */
  function stamp(extra){ const s=$('#statusbar'); const u=board.updatedAt?new Date(board.updatedAt).toLocaleString('pt-BR'):'—';
    s.innerHTML=`<span>Atualizado: ${u}${extra?' · '+extra:''}</span><span>${board.columns.reduce((a,c)=>a+c.cards.length,0)} amostras · ${SYNC_READY?(getToken()?'sincronização ligada':'sincronização disponível'):'modo local'}</span>`; }

  /* ---------- Tema ---------- */
  function applyTheme(t){ document.documentElement.setAttribute('data-theme',t); $('#btnTheme').textContent=t==='dark'?'☀️':'🌙'; try{localStorage.setItem(LS_THEME,t);}catch(e){} }

  /* ---------- Ligações ---------- */
  function bind(){
    $('#search').addEventListener('input',debounce(e=>{filters.text=e.target.value.trim();renderBoard();},120));
    $('#btnFilters').onclick=()=>{filtersOpen=!filtersOpen;render();};
    $('#btnTemplates').onclick=drawerTemplates;
    $('#btnAddColumn').onclick=addColumn;
    $('#btnSync').onclick=drawerSync;
    $('#btnMenu').onclick=drawerMenu;
    $('#btnTheme').onclick=()=>applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');
    $('#boardTitle').addEventListener('change',e=>{board.title=e.target.value.trim()||'Quadro';touched();});
    document.addEventListener('keydown',e=>{ if(e.key==='Escape'){closeModal.__=1;$('#modalRoot').innerHTML='';closeDrawer();closePop();} });
    window.addEventListener('focus',()=>{ if(SYNC_READY&&getToken())pullSync(); });
  }

  /* ---------- Início ---------- */
  function start(){
    let t='light'; try{t=localStorage.getItem(LS_THEME)||'light';}catch(e){}
    applyTheme(t);
    $('#boardTitle').value=board.title||'Bancada de Microbiologia';
    bind(); render(); stamp(); setSyncDot();
    if(SYNC_READY&&getToken()){ syncState='on'; setSyncDot(); pullSync(); }
  }
  // acesso de leitura ao quadro (útil p/ backup, scripts e seed da nuvem)
  window.__board = () => board;

  document.addEventListener('DOMContentLoaded',start);
  if(document.readyState!=='loading') start();
})();

</script>
</body>
</html>
